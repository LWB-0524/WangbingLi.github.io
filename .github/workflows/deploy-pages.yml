name: Refresh data and deploy GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    # Daily at 09:17 Asia/Shanghai (01:17 UTC). Avoids the busy top of hour.
    - cron: "17 1 * * *"
  workflow_dispatch:

concurrency:
  group: github-pages
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: api/requirements.txt

      - name: Install Scholar updater dependencies
        run: python -m pip install -r api/requirements.txt

      - name: Test Scholar updater
        run: python -m unittest discover -s tests -p "test_*.py"

      - name: Refresh Google Scholar data
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: python api/scholar.py --output scholar_data.json

      - name: Commit daily Scholar snapshot
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scholar_data.json
          git commit -m "chore: refresh Google Scholar data" || exit 0
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
